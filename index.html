<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Kimberly ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --rose: #e8a0b8;
      --rose-deep: #c77b96;
      --cream: #fff5f7;
      --gold: #d4a574;
      --text: #5c3d4a;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(165deg, #fff8fa 0%, #ffe8ef 30%, #ffdde8 60%, #fce4ec 100%);
      font-family: 'Quicksand', sans-serif;
      color: var(--text);
    }

    .hero {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 600;
      color: var(--rose-deep);
      text-shadow: 0 2px 20px rgba(199, 123, 150, 0.3);
      letter-spacing: 0.05em;
    }

    .hero .sub {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--gold);
      margin-top: 0.5rem;
      font-style: italic;
    }

    .infinite-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      z-index: 1;
      opacity: 0.85;
    }

    .row {
      display: flex;
      white-space: nowrap;
      animation: scroll-left 40s linear infinite;
    }

    .row:nth-child(even) {
      animation-direction: reverse;
      animation-duration: 45s;
    }

    .row:nth-child(3n) {
      animation-duration: 50s;
    }

    .word {
      display: inline-block;
      padding: 0.25em 0.75em;
      margin: 0 0.5em;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.2vw, 1.8rem);
      font-weight: 500;
      color: var(--text);
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .word.highlight {
      color: var(--rose-deep);
      font-weight: 600;
      opacity: 1;
    }

    .word.heart {
      color: var(--rose);
      font-size: 1.2em;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .row .words-group {
      display: inline-flex;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Kimberly</h1>
    <p class="sub">you're so loved</p>
  </div>

  <div class="infinite-wrap">
    <div class="row" data-row="0"></div>
    <div class="row" data-row="1"></div>
    <div class="row" data-row="2"></div>
    <div class="row" data-row="3"></div>
    <div class="row" data-row="4"></div>
    <div class="row" data-row="5"></div>
  </div>

  <script>
    const phrases = [
      "You're Beautiful",
      "You're Amazing",
      "You're Kind",
      "You're Loved",
      "You're Perfect",
      "You're Wonderful",
      "You're Stunning",
      "You're Brilliant",
      "You're Precious",
      "You're Special",
      "Kimberly",
      "♥",
      "I love you",
      "So proud of you",
      "You shine",
      "You matter",
      "You're enough",
      "You're incredible",
      "You're one of a kind",
      "You make me happy",
      "Thank you for being you",
      "You're the best",
      "You're gorgeous",
      "You're strong",
      "You're brave",
      "You're sweet",
      "You're funny",
      "You're caring",
      "You're talented",
      "You're irreplaceable",
      "Forever yours",
      "♥",
      "Kimberly",
    ];

    function buildRow(rowEl) {
      const group = document.createElement('span');
      group.className = 'words-group';
      const group2 = document.createElement('span');
      group2.className = 'words-group';

      phrases.forEach((phrase, i) => {
        const span = document.createElement('span');
        span.className = 'word';
        if (phrase === 'Kimberly') span.classList.add('highlight');
        if (phrase === '♥') span.classList.add('heart');
        span.textContent = phrase;
        group.appendChild(span);
        const span2 = span.cloneNode(true);
        group2.appendChild(span2);
      });

      rowEl.appendChild(group);
      rowEl.appendChild(group2);
    }

    document.querySelectorAll('.row').forEach(buildRow);
  </script>
</body>
</html>
